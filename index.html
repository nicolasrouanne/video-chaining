<!doctype html>
<meta charset="utf-8" />
<title>HLS concat POC</title>
<style>
  body {
    margin: 0;
    background: #111;
    color: #eee;
    font-family: system-ui;
    padding: 24px;
    max-width: 900px;
  }
  video {
    width: 100%;
    aspect-ratio: 16/9;
    background: #000;
  }
  a {
    color: #5b8def;
  }
</style>
<h1>HLS concat — 1 player, N chained videos</h1>
<video id="v" controls autoplay muted playsinline></video>
<p>Manifest: <a href="/playlist.m3u8" target="_blank">/playlist.m3u8</a></p>
<details>
  <summary>Use your own m3u8 URLs (creates a shareable link)</summary>
  <form id="form" style="margin-top: 8px">
    <textarea
      id="src"
      rows="6"
      style="width: 100%; background: #222; color: #eee; border: 1px solid #333; padding: 8px"
      placeholder="One m3u8 URL per line"></textarea>
    <button type="submit" style="margin-top: 8px; padding: 6px 14px">Play these</button>
  </form>
</details>
<script type="module">
  import Hls from "https://cdn.jsdelivr.net/npm/hls.js@1.5.17/dist/hls.mjs";
  const v = document.getElementById("v");
  const sources = new URLSearchParams(location.search).getAll("source");
  document.getElementById("src").value = sources.join("\n");
  document.getElementById("form").onsubmit = (e) => {
    e.preventDefault();
    const lines = document.getElementById("src").value.split("\n").map((l) => l.trim()).filter(Boolean);
    location.search = lines.map((l) => `source=${encodeURIComponent(l)}`).join("&");
  };
  const playlistUrl = `/playlist.m3u8${location.search}`;
  if (Hls.isSupported()) {
    const h = new Hls({ startFragPrefetch: true });
    h.loadSource(playlistUrl);
    h.attachMedia(v);
    window.hls = h; // inspect hls.levels / hls.currentLevel in DevTools console
  } else if (v.canPlayType("application/vnd.apple.mpegurl")) {
    v.src = playlistUrl;
  }
</script>
