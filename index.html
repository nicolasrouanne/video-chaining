<!doctype html>
<meta charset="utf-8" />
<title>HLS concat POC</title>
<style>
  body {
    margin: 0;
    background: #111;
    color: #eee;
    font-family: system-ui;
    padding: 24px;
    max-width: 900px;
  }
  video {
    width: 100%;
    aspect-ratio: 16/9;
    background: #000;
  }
  a {
    color: #5b8def;
  }
</style>
<h1>HLS concat — 1 player, 3 vidéos chaînées</h1>
<video id="v" controls autoplay muted playsinline></video>
<p>Manifeste : <a href="/playlist.m3u8" target="_blank">/playlist.m3u8</a></p>
<script type="module">
  import Hls from "https://cdn.jsdelivr.net/npm/hls.js@1.5.17/dist/hls.mjs";
  const v = document.getElementById("v");
  if (Hls.isSupported()) {
    const h = new Hls();
    h.loadSource("/playlist.m3u8");
    h.attachMedia(v);
  } else if (v.canPlayType("application/vnd.apple.mpegurl")) {
    v.src = "/playlist.m3u8";
  }
</script>
